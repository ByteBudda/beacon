<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #fff; padding: 16px; }
.logo { text-align: center; margin-bottom: 16px; }
.logo h1 { font-size: 18px; font-weight: 700; color: #0078d4; }
.logo p { font-size: 11px; opacity: 0.5; margin-top: 2px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.field input { width: 100%; padding: 10px 12px; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; background: rgba(255,255,255,0.08); color: #fff; font-size: 13px; outline: none; }
.field input:focus { border-color: rgba(0,120,212,0.5); }
.btn { width: 100%; padding: 12px; background: #0078d4; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
.btn:hover { background: #006abc; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.result { margin-top: 12px; padding: 12px; background: rgba(0,120,212,0.15); border: 1px solid rgba(0,120,212,0.25); border-radius: 10px; display: none; }
.result.show { display: block; animation: slideUp .3s ease; }
.result-url { display: flex; align-items: center; gap: 8px; }
.result-url a { flex: 1; color: #4fc3f7; font-size: 14px; font-weight: 600; text-decoration: none; word-break: break-all; }
.result-url a:hover { text-decoration: underline; }
.copy-btn { padding: 6px 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; cursor: pointer; font-size: 12px; white-space: nowrap; }
.copy-btn:hover { background: rgba(255,255,255,0.2); }
.qr-img { display: block; margin: 10px auto 0; width: 100px; height: 100px; border-radius: 8px; background: #fff; padding: 4px; cursor: pointer; }
.error { color: #f44336; font-size: 13px; margin-top: 8px; }
.networks { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }
.net-btn { width: 36px; height: 36px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.net-btn:hover { transform: scale(1.1); }
.net-btn.tg { background: rgba(0,136,204,0.2); color: #0088cc; }
.net-btn.vk { background: rgba(74,118,168,0.2); color: #4a76a8; }
.net-btn.wa { background: rgba(37,211,102,0.2); color: #25d366; }
.settings { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); }
.settings-toggle { font-size: 11px; color: rgba(255,255,255,0.4); cursor: pointer; text-align: center; }
.settings-toggle:hover { color: rgba(255,255,255,0.6); }
.settings-body { display: none; margin-top: 8px; }
.settings-body.show { display: block; }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="logo">
    <h1>QNTX.Beacon</h1>
    <p>URL Shortener</p>
</div>

<div class="field">
    <label>Текущая страница</label>
    <input type="text" id="current-url" readonly>
</div>

<div class="field">
    <label>Кастомный алиас (опционально)</label>
    <input type="text" id="custom-slug" placeholder="my-link">
</div>

<button class="btn" id="btn-shorten" onclick="shorten()">Сократить</button>

<div class="result" id="result">
    <div class="result-url">
        <a href="#" id="short-url" target="_blank"></a>
        <button class="copy-btn" onclick="copyShort()">Копировать</button>
    </div>
    <img id="qr-img" class="qr-img" style="display:none" onclick="downloadQR()">
    <div class="networks">
        <button class="net-btn tg" onclick="share('telegram')" title="Telegram">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
        </button>
        <button class="net-btn vk" onclick="share('vk')" title="VK">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.684 0H8.316C1.592 0 0 1.592 0 8.316v7.368C0 22.408 1.592 24 8.316 24h7.368C22.408 24 24 22.408 24 15.684V8.316C24 1.592 22.391 0 15.684 0zm3.692 17.123h-1.744c-.66 0-.864-.525-2.05-1.727-1.033-1-1.49-1.135-1.744-1.135-.356 0-.458.102-.458.593v1.575c0 .424-.135.678-1.253.678-1.846 0-3.896-1.12-5.335-3.202C4.624 10.857 4 8.602 4 8.178c0-.254.102-.491.593-.491h1.744c.44 0 .61.203.78.678.864 2.49 2.303 4.675 2.896 4.675.22 0 .322-.102.322-.66V9.721c-.068-1.186-.695-1.287-.695-1.71 0-.204.17-.407.44-.407h2.744c.373 0 .508.203.508.643v3.473c0 .372.17.508.271.508.22 0 .407-.136.813-.542 1.253-1.406 2.151-3.574 2.151-3.574.119-.254.322-.491.763-.491h1.744c.525 0 .644.27.525.643-.22 1.017-2.354 4.031-2.354 4.031-.186.305-.254.44 0 .78.186.254.796.779 1.203 1.253.745.847 1.32 1.558 1.473 2.05.17.49-.085.744-.576.744z"/></svg>
        </button>
        <button class="net-btn wa" onclick="share('whatsapp')" title="WhatsApp">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </button>
    </div>
</div>

<div class="error" id="error" style="display:none"></div>

<div class="settings">
    <div class="settings-toggle" onclick="toggleSettings()">Настройки</div>
    <div class="settings-body" id="settings-body">
        <div class="field">
            <label>API URL</label>
            <input type="text" id="api-url" placeholder="https://qntx.ru">
        </div>
        <div class="field">
            <label>Токен (из личного кабинета)</label>
            <input type="password" id="api-token" placeholder="bcon_...">
        </div>
        <button class="btn" onclick="saveSettings()" style="margin-top:8px;font-size:12px;padding:8px">Сохранить</button>
    </div>
</div>

<script src="popup.js"></script>
</body>
</html>
